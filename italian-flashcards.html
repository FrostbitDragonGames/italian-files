<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Italiano Flashcards</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex; align-items: center; justify-content: center;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.25); }
    }
    .card-text { animation: fadeUp 0.35s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useCallback, useRef } = React;
const h = React.createElement;

// ── Inline flag SVGs ──────────────────────────────────────────
function FlagIT({ width=20, height=15 }) {
  return h('svg', { xmlns:'http://www.w3.org/2000/svg', viewBox:'0 0 3 2', width, height, style:{borderRadius:'2px',display:'inline-block',verticalAlign:'middle'} },
    h('rect', { width:'1', height:'2', fill:'#009246' }),
    h('rect', { x:'1', width:'1', height:'2', fill:'#fff' }),
    h('rect', { x:'2', width:'1', height:'2', fill:'#ce2b37' })
  );
}
function FlagGB({ width=20, height=15 }) {
  return h('svg', { xmlns:'http://www.w3.org/2000/svg', viewBox:'0 0 60 30', width, height, style:{borderRadius:'2px',display:'inline-block',verticalAlign:'middle'} },
    h('rect', { width:'60', height:'30', fill:'#012169' }),
    h('path', { d:'M0,0 L60,30 M60,0 L0,30', stroke:'#fff', strokeWidth:'6' }),
    h('path', { d:'M0,0 L60,30 M60,0 L0,30', stroke:'#C8102E', strokeWidth:'4' }),
    h('path', { d:'M30,0 V30 M0,15 H60', stroke:'#fff', strokeWidth:'10' }),
    h('path', { d:'M30,0 V30 M0,15 H60', stroke:'#C8102E', strokeWidth:'6' })
  );
}
function FlagIcon({ code, width=20, height=15 }) {
  return code === 'it' ? h(FlagIT, {width, height}) : h(FlagGB, {width, height});
}

// ── Data ──────────────────────────────────────────────────────
const DEFAULT_PHRASES = [
  ["Hello","Ciao"],["Good morning","Buongiorno"],["Good afternoon","Buon pomeriggio"],
  ["Good evening","Buonasera"],["Good night","Buonanotte"],["Goodbye","Arrivederci"],
  ["See you later","A dopo"],["See you tomorrow","A domani"],["Please","Per favore"],
  ["Thank you","Grazie"],["Thank you very much","Grazie mille"],["You're welcome","Prego"],
  ["Excuse me","Scusi"],["I'm sorry","Mi dispiace"],["Yes","Sì"],["No","No"],
  ["Maybe","Forse"],["Of course","Certo"],["How are you?","Come stai?"],
  ["I'm fine, thanks","Sto bene, grazie"],["What is your name?","Come ti chiami?"],
  ["My name is...","Mi chiamo..."],["Nice to meet you","Piacere di conoscerti"],
  ["Where are you from?","Di dove sei?"],["I am from...","Sono di..."],
  ["Do you speak English?","Parli inglese?"],["I don't understand","Non capisco"],
  ["Can you repeat that?","Puoi ripetere?"],["Can you speak slowly?","Puoi parlare lentamente?"],
  ["I don't speak Italian","Non parlo italiano"],["How much does this cost?","Quanto costa?"],
  ["Where is the bathroom?","Dov'è il bagno?"],["Where is the hospital?","Dov'è l'ospedale?"],
  ["I need help","Ho bisogno di aiuto"],["Call the police!","Chiama la polizia!"],
  ["I am lost","Mi sono perso"],["Can you help me?","Puoi aiutarmi?"],
  ["I am hungry","Ho fame"],["I am thirsty","Ho sete"],["I am tired","Sono stanco"],
  ["I am sick","Sono malato"],["I am cold","Ho freddo"],["I am hot","Ho caldo"],
  ["What time is it?","Che ora è?"],["Today","Oggi"],["Yesterday","Ieri"],
  ["Tomorrow","Domani"],["Now","Adesso"],["Later","Più tardi"],
  ["A table for two, please","Un tavolo per due, per favore"],["The menu, please","Il menu, per favore"],
  ["I would like...","Vorrei..."],["The bill, please","Il conto, per favore"],
  ["Is service included?","Il servizio è incluso?"],["Water, please","Acqua, per favore"],
  ["A coffee, please","Un caffè, per favore"],["Where can I find a taxi?","Dove posso trovare un taxi?"],
  ["Take me to this address","Portami a questo indirizzo"],["How far is it?","Quanto è lontano?"],
  ["Turn left","Gira a sinistra"],["Turn right","Gira a destra"],
  ["Go straight ahead","Vai dritto"],["Stop here","Fermati qui"],
  ["I have a reservation","Ho una prenotazione"],["Do you have any rooms available?","Avete camere disponibili?"],
  ["How much per night?","Quanto costa a notte?"],["I'd like to check in","Vorrei fare il check-in"],
  ["I'd like to check out","Vorrei fare il check-out"],["Where is my room?","Dov'è la mia camera?"],
  ["Can I have the key?","Posso avere la chiave?"],["Do you accept credit cards?","Accettate carte di credito?"],
  ["Can I have a receipt?","Posso avere la ricevuta?"],["I'd like to buy this","Vorrei comprare questo"],
  ["Do you have this in another size?","Lo avete in un'altra taglia?"],
  ["Do you have this in another color?","Lo avete in un altro colore?"],
  ["That's too expensive","È troppo caro"],["I'll take it","Lo prendo"],
  ["Open","Aperto"],["Closed","Chiuso"],["Entrance","Entrata"],["Exit","Uscita"],
  ["Push","Spingere"],["Pull","Tirare"],["Danger","Pericolo"],["No smoking","Vietato fumare"],
  ["Happy birthday!","Buon compleanno!"],["Congratulations!","Congratulazioni!"],
  ["Good luck!","In bocca al lupo!"],["Cheers!","Salute!"],
  ["Enjoy your meal!","Buon appetito!"],["Have a good trip!","Buon viaggio!"],
  ["I love you","Ti amo"],["I miss you","Mi manchi"],
  ["Where are we going?","Dove andiamo?"],["Can you write it down?","Puoi scriverlo?"],
  ["I'd like to make a phone call","Vorrei fare una telefonata"],
  ["Is there Wi-Fi here?","C'è il Wi-Fi qui?"],
  ["What is the Wi-Fi password?","Qual è la password del Wi-Fi?"],
  ["I need a doctor","Ho bisogno di un medico"],
  ["It hurts here","Mi fa male qui"],["I am allergic to...","Sono allergico a..."],
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function parseFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        let pairs = rows
          .filter(row => row[0] && row[1] && String(row[0]).trim() && String(row[1]).trim())
          .map(row => [String(row[0]).trim(), String(row[1]).trim()]);
        if (pairs.length > 0) {
          const [a, b] = pairs[0];
          const headerWords = ['english','italian','italiano','phrase','word','column','col','a','b','front','back'];
          if (headerWords.includes(a.toLowerCase()) || headerWords.includes(b.toLowerCase())) pairs.shift();
        }
        if (pairs.length === 0) reject(new Error('No valid phrase pairs found. Make sure column A = English, column B = Italian.'));
        else resolve(pairs);
      } catch(err) { reject(new Error('Could not parse file: ' + err.message)); }
    };
    reader.onerror = () => reject(new Error('Failed to read file.'));
    reader.readAsArrayBuffer(file);
  });
}

// ── CardFace ──────────────────────────────────────────────────
function CardFace({ text, lang, flag, hint, isBack, isItalian, italianText }) {
  const [speaking, setSpeaking] = useState(false);

  const handleSpeak = (e) => {
    e.stopPropagation();
    if (!window.speechSynthesis) return;
    setSpeaking(true);
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(italianText);
    utter.lang = 'it-IT'; utter.rate = 0.88; utter.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const italianVoice = voices.find(v => v.lang.startsWith('it'));
    if (italianVoice) utter.voice = italianVoice;
    utter.onend = () => setSpeaking(false);
    utter.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utter);
  };

  const bg = isItalian ? 'linear-gradient(145deg,#1a3a2a,#0d2318)' : 'linear-gradient(145deg,#1a2a4a,#0d1830)';
  const ac = isItalian ? '#5dde8a' : '#5ab4ff';
  const acDim = isItalian ? 'rgba(93,222,138,0.15)' : 'rgba(90,180,255,0.15)';
  const fontSize = text.length > 30 ? 'clamp(18px,3.5vw,26px)' : 'clamp(22px,4.5vw,34px)';

  return h('div', {
    style: {
      position:'absolute', inset:0,
      backfaceVisibility:'hidden', WebkitBackfaceVisibility:'hidden',
      transform: isBack ? 'rotateY(180deg)' : 'rotateY(0deg)',
      background: bg, borderRadius:'20px',
      border:`1.5px solid ${ac}28`,
      boxShadow:`0 25px 60px rgba(0,0,0,0.5),0 0 0 1px ${ac}12,inset 0 1px 0 rgba(255,255,255,0.07)`,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      padding:'32px 36px', userSelect:'none',
    }
  },
    // Language badge
    h('div', { style:{position:'absolute',top:'18px',left:'22px',display:'flex',alignItems:'center',gap:'7px',background:acDim,border:`1px solid ${ac}30`,borderRadius:'20px',padding:'4px 12px'} },
      h(FlagIcon, { code: flag, width:20, height:15 }),
      h('span', { style:{fontSize:'11px',letterSpacing:'2px',color:ac,textTransform:'uppercase',fontFamily:'Arial,sans-serif'} }, lang)
    ),
    // Decorative quote
    h('div', { style:{position:'absolute',top:'28px',right:'28px',fontSize:'52px',color:`${ac}12`,fontFamily:'Georgia,serif',lineHeight:1,userSelect:'none'} }, '\u201C'),
    // Main text
    h('p', { className:'card-text', style:{margin:0,fontSize,color:'#fff',textAlign:'center',lineHeight:1.35,fontWeight:'normal',fontStyle:isItalian?'italic':'normal',letterSpacing:isItalian?'0.5px':'0'} }, text),
    // Listen button (Italian side only)
    isItalian && h('button', {
      onClick: handleSpeak,
      title: 'Hear pronunciation',
      style:{
        position:'absolute',bottom:'12px',left:'16px',
        background: speaking ? 'rgba(93,222,138,0.25)' : 'rgba(93,222,138,0.1)',
        border:`1px solid ${speaking ? 'rgba(93,222,138,0.7)' : 'rgba(93,222,138,0.3)'}`,
        borderRadius:'20px',padding:'5px 13px',
        display:'flex',alignItems:'center',gap:'6px',
        cursor:'pointer',transition:'all 0.2s',
        color: speaking ? '#5dde8a' : 'rgba(93,222,138,0.7)',
        fontSize:'12px',letterSpacing:'1px',
        fontFamily:'Arial,sans-serif',userSelect:'none',
      }
    },
      h('span', { style:{fontSize:'15px',display:'inline-block',animation:speaking?'pulse 0.7s ease-in-out infinite alternate':'none'} }, speaking ? '🔊' : '🔉'),
      h('span', { style:{textTransform:'uppercase',fontSize:'10px'} }, speaking ? 'Playing…' : 'Listen')
    ),
    // Hint
    h('div', { style:{position:'absolute',bottom:'16px',right:'20px',fontSize:'11px',color:'rgba(255,255,255,0.2)',letterSpacing:'1px',fontFamily:'Arial,sans-serif',textTransform:'uppercase'} }, hint)
  );
}

// ── Main App ──────────────────────────────────────────────────
function FlashcardApp() {
  const [phrases, setPhrases]       = useState(DEFAULT_PHRASES);
  const [sourceName, setSourceName] = useState(null);
  const [deck, setDeck]             = useState(() => shuffle(DEFAULT_PHRASES));
  const [index, setIndex]           = useState(0);
  const [flipped, setFlipped]       = useState(false);
  const [italianFirst, setItalianFirst] = useState(true);
  const [animating, setAnimating]   = useState(false);
  const [slideDir, setSlideDir]     = useState(null);
  const [uploadError, setUploadError] = useState(null);
  const [isDragging, setIsDragging] = useState(false);
  const [uploadSuccess, setUploadSuccess] = useState(false);
  const fileInputRef = useRef();

  const loadPhrases = (pairs, name) => {
    setPhrases(pairs); setDeck(shuffle(pairs)); setIndex(0); setFlipped(false);
    setSourceName(name); setUploadError(null); setUploadSuccess(true);
    setTimeout(() => setUploadSuccess(false), 3000);
  };

  const handleFile = async (file) => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx','xls','csv'].includes(ext)) { setUploadError('Please upload an .xlsx, .xls, or .csv file.'); return; }
    setUploadError(null);
    try { loadPhrases(await parseFile(file), file.name); }
    catch(err) { setUploadError(err.message || 'Could not parse file.'); }
  };

  const handleDrop = (e) => { e.preventDefault(); setIsDragging(false); handleFile(e.dataTransfer.files[0]); };

  const resetToDefault = () => {
    setPhrases(DEFAULT_PHRASES); setDeck(shuffle(DEFAULT_PHRASES));
    setIndex(0); setFlipped(false); setSourceName(null); setUploadError(null);
  };

  const current = deck[index];
  const front      = italianFirst ? current[1] : current[0];
  const back       = italianFirst ? current[0] : current[1];
  const frontLang  = italianFirst ? 'Italiano' : 'English';
  const backLang   = italianFirst ? 'English'  : 'Italiano';
  const frontFlag  = italianFirst ? 'it' : 'gb';
  const backFlag   = italianFirst ? 'gb' : 'it';
  const italianText = current[1];

  const goNext = useCallback(() => {
    if (animating) return;
    setAnimating(true); setSlideDir('out');
    setTimeout(() => {
      setIndex(i => (i + 1) % deck.length); setFlipped(false); setSlideDir('in');
      setTimeout(() => { setSlideDir(null); setAnimating(false); }, 350);
    }, 300);
  }, [animating, deck.length]);

  const handleCardClick = () => { if (animating) return; flipped ? goNext() : setFlipped(true); };
  const progress = ((index + 1) / deck.length) * 100;

  const slideStyle = {
    opacity:   slideDir === 'out' ? 0 : 1,
    transform: slideDir === 'out' ? 'translateX(60px) scale(0.95)' : slideDir === 'in' ? 'translateX(-40px) scale(0.97)' : 'translateX(0) scale(1)',
    transition: slideDir ? 'all 0.3s cubic-bezier(0.4,0,0.2,1)' : 'all 0.35s cubic-bezier(0.4,0,0.2,1)',
  };

  const uploadBorder  = uploadSuccess ? 'rgba(93,222,138,0.6)' : isDragging ? 'rgba(255,210,80,0.7)' : 'rgba(255,255,255,0.15)';
  const uploadBg      = uploadSuccess ? 'rgba(93,222,138,0.06)' : isDragging ? 'rgba(255,210,80,0.06)' : 'rgba(255,255,255,0.03)';
  const uploadColor   = uploadSuccess ? '#5dde8a' : isDragging ? '#ffd250' : 'rgba(255,255,255,0.5)';
  const uploadText    = uploadSuccess ? `Loaded! ${phrases.length} cards ready.` : isDragging ? 'Drop to load your list…' : 'Upload your own phrase list';

  return h('div', {
    style:{minHeight:'100vh',background:'linear-gradient(135deg,#0f0c29,#302b63 50%,#24243e)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:"'Georgia','Times New Roman',serif",padding:'20px',position:'relative',overflow:'hidden'}
  },
    // Bg circles
    h('div', {style:{position:'absolute',top:'-80px',left:'-80px',width:'300px',height:'300px',borderRadius:'50%',background:'rgba(255,255,255,0.03)',pointerEvents:'none'}}),
    h('div', {style:{position:'absolute',bottom:'-60px',right:'-60px',width:'250px',height:'250px',borderRadius:'50%',background:'rgba(255,255,255,0.03)',pointerEvents:'none'}}),

    // Header
    h('div', {style:{textAlign:'center',marginBottom:'24px',zIndex:1}},
      h('div', {style:{fontSize:'13px',letterSpacing:'5px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',marginBottom:'6px'}}, 'Language Learning'),
      h('h1', {style:{margin:0,fontSize:'clamp(26px,5vw,38px)',fontWeight:'normal',color:'#fff',letterSpacing:'2px',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px'}},
        h(FlagIT, {width:32, height:24}),
        h('em', null, 'Italiano'), ' Flashcards'
      ),
      sourceName
        ? h('div', {style:{marginTop:'8px',fontSize:'12px',color:'rgba(255,210,80,0.8)',letterSpacing:'0.5px'}},
            `📂 ${sourceName} — ${phrases.length} cards loaded  `,
            h('button', {onClick:resetToDefault, style:{background:'none',border:'none',color:'rgba(255,255,255,0.3)',cursor:'pointer',fontSize:'11px',textDecoration:'underline',fontFamily:'inherit'}}, 'use default list')
          )
        : h('div', {style:{marginTop:'8px',fontSize:'12px',color:'rgba(255,255,255,0.3)'}}, `${phrases.length} cards — default list`)
    ),

    // Controls
    h('div', {style:{display:'flex',gap:'12px',marginBottom:'28px',alignItems:'center',zIndex:1,flexWrap:'wrap',justifyContent:'center'}},
      h('button', {
        onClick: () => { setFlipped(false); setItalianFirst(v => !v); },
        style:{background:italianFirst?'rgba(255,210,80,0.18)':'rgba(255,255,255,0.1)',border:italianFirst?'1.5px solid rgba(255,210,80,0.6)':'1.5px solid rgba(255,255,255,0.2)',color:italianFirst?'#ffd250':'rgba(255,255,255,0.75)',borderRadius:'30px',padding:'9px 22px',fontSize:'13px',letterSpacing:'1.5px',cursor:'pointer',transition:'all 0.25s',fontFamily:'inherit',textTransform:'uppercase',display:'flex',alignItems:'center',gap:'7px'}
      },
        h(FlagIcon, {code: italianFirst?'it':'gb', width:18, height:13}),
        italianFirst ? 'Italian First' : 'English First'
      ),
      h('button', {
        onClick: () => { if (!animating) { setDeck(shuffle(phrases)); setIndex(0); setFlipped(false); } },
        style:{background:'rgba(255,255,255,0.08)',border:'1.5px solid rgba(255,255,255,0.2)',color:'rgba(255,255,255,0.65)',borderRadius:'30px',padding:'9px 22px',fontSize:'13px',letterSpacing:'1.5px',cursor:'pointer',transition:'all 0.25s',fontFamily:'inherit',textTransform:'uppercase'}
      }, '↺ Reshuffle')
    ),

    // Card
    h('div', { onClick: handleCardClick, style:{perspective:'1200px',cursor:animating?'default':'pointer',zIndex:1,...slideStyle} },
      h('div', { style:{width:'clamp(300px,80vw,520px)',height:'clamp(200px,40vw,300px)',position:'relative',transformStyle:'preserve-3d',transform:flipped?'rotateY(180deg)':'rotateY(0deg)',transition:'transform 0.55s cubic-bezier(0.4,0,0.2,1)'} },
        h(CardFace, {text:front, lang:frontLang, flag:frontFlag, hint:'Click to reveal',  isBack:false, isItalian:italianFirst,  italianText}),
        h(CardFace, {text:back,  lang:backLang,  flag:backFlag,  hint:'Click for next card →', isBack:true,  isItalian:!italianFirst, italianText})
      )
    ),

    // Progress bar
    h('div', {style:{marginTop:'40px',width:'clamp(300px,80vw,520px)',zIndex:1}},
      h('div', {style:{display:'flex',justifyContent:'space-between',marginBottom:'8px',color:'rgba(255,255,255,0.4)',fontSize:'12px',letterSpacing:'1px'}},
        h('span', null, `Card ${index+1} of ${deck.length}`),
        h('span', null, `${Math.round(progress)}% complete`)
      ),
      h('div', {style:{height:'3px',background:'rgba(255,255,255,0.1)',borderRadius:'2px',overflow:'hidden'}},
        h('div', {style:{height:'100%',width:`${progress}%`,background:'linear-gradient(90deg,#ffd250,#ff8c69)',borderRadius:'2px',transition:'width 0.4s ease'}})
      )
    ),

    h('div', {style:{marginTop:'20px',color:'rgba(255,255,255,0.25)',fontSize:'12px',letterSpacing:'1px',zIndex:1}},
      flipped ? 'Click card to advance →' : 'Click card to flip'
    ),

    // Upload zone
    h('div', {
      onDrop: handleDrop,
      onDragOver: (e) => { e.preventDefault(); setIsDragging(true); },
      onDragLeave: () => setIsDragging(false),
      onClick: () => fileInputRef.current.click(),
      style:{zIndex:1,marginTop:'32px',width:'clamp(300px,80vw,520px)',border:`1.5px dashed ${uploadBorder}`,borderRadius:'12px',padding:'13px 20px',display:'flex',alignItems:'center',gap:'12px',cursor:'pointer',background:uploadBg,transition:'all 0.25s'}
    },
      h('span', {style:{fontSize:'20px'}}, uploadSuccess ? '✅' : '📤'),
      h('div', {style:{flex:1}},
        h('div', {style:{fontSize:'13px',color:uploadColor,letterSpacing:'0.5px'}}, uploadText),
        h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,0.22)',marginTop:'2px'}}, '.xlsx · .xls · .csv | Col A = English, Col B = Italian | click or drag & drop')
      ),
      h('input', {ref:fileInputRef, type:'file', accept:'.xlsx,.xls,.csv', style:{display:'none'}, onChange:(e)=>handleFile(e.target.files[0])})
    ),

    uploadError && h('div', {style:{zIndex:1,marginTop:'10px',color:'#ff8080',fontSize:'12px',background:'rgba(255,60,60,0.08)',border:'1px solid rgba(255,60,60,0.25)',borderRadius:'8px',padding:'8px 16px',width:'clamp(260px,76vw,490px)'}},
      '⚠️ ' + uploadError
    ),

    // Download button
    h('a', {
      href:'https://frostbitdragongames.github.io/italian-files/',
      target:'_blank', rel:'noopener noreferrer',
      style:{zIndex:1,marginTop:'14px',marginBottom:'32px',display:'inline-flex',alignItems:'center',gap:'8px',background:'rgba(255,210,80,0.1)',border:'1.5px solid rgba(255,210,80,0.35)',color:'#ffd250',borderRadius:'30px',padding:'10px 26px',fontSize:'13px',letterSpacing:'1.5px',textDecoration:'none',textTransform:'uppercase',fontFamily:"'Georgia','Times New Roman',serif",transition:'all 0.25s',cursor:'pointer'},
      onMouseEnter: e => { e.currentTarget.style.background='rgba(255,210,80,0.2)'; e.currentTarget.style.borderColor='rgba(255,210,80,0.65)'; },
      onMouseLeave: e => { e.currentTarget.style.background='rgba(255,210,80,0.1)'; e.currentTarget.style.borderColor='rgba(255,210,80,0.35)'; },
    },
      h('span', {style:{fontSize:'16px'}}, '⬇️'),
      'Download Phrase Lists'
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(FlashcardApp));
</script>
</body>
</html>
